  <circle cx="21" cy="28" r="2" fill="currentColor" opacity="0.4"/>
  <text x="25" y="30" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-style="italic" font-weight="400" fill="currentColor">J</text>
</svg>
